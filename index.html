<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <meta name="description" content="A seat booking web application with bilingual support for managing services, pricing, and seat reservations.">
    <title>Project</title>
</head>
<body>
    <main id="main-content"></main>
    <div id="seat-booking-app">
        <div id="settings" class="settings">
            <div class="services-list">
                <div class="language-switcher">
                    <label for="language-select" id="language-label">Language:</label>
                    <select id="language-select">
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                    </select>
                </div>
                
                <label for="services-list" id="services-list-label" class="form-label">Service list:</label>
                <select name="services-list" id="services-list"></select>
                <!-- <form action="#" id="settings-form" class="services-list__form"> -->

                <label for="service-name" id="movie-title-label" class="form-label">Movie title:</label>
                <input type="text" name="service-name" id="service-name">

                <label for="service-price" id="price-base-label" class="form-label">Price base:</label>
                <input type="number" name="service-price" id="service-price" min="0" max="100" step="0.01">

                <div class="services-list__btns">
                    <button id="service-add-btn" class="btn">Add new</button>
                    <button id="service-update-btn" class="btn">Save changes</button>
                    <button id="service-delete-btn" class="btn">Delete</button>
                </div>
                <!-- </form> -->
            </div>

            <div class="sectors">
                <button id="sectors-price-btn" class="btn">Edit sectors' prices</button>
                <h3 id="sector-multipliers-label">Price multipliers for each sector:</h3>
                <ul id="sectors-list" class="sectors__list"></ul>
                <button id="sectors-save-btn" class="btn">Save</button>
            </div>

            <div id="order" class="order">
                <div class="order__header">
                    <h2 id="tickets-label">Tickets:</h2>
                </div>

                <div class="order__main">
                    <ul id="order-details"></ul>
                </div>

                <div id="order-footer" class="order__footer">
                    <span id="order-total-price"></span>
                    <button id="book-seats-btn" class="btn">Buy</button>
                </div>
            </div>
        </div>

        <div id="screening-room-1">
            <div id="screen">Screen</div>
            <div id="seats"></div>
        </div>
    </div>

        </div>
    </main>
    <script src="script/seat-booking-app.js"></script>
</body>
</html>
