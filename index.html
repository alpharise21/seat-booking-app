<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Interactive movie seat booking application. Choose your favorite movie, select seats in different sectors, and manage your ticket prices efficiently.">
    
    <link rel="stylesheet" href="style/style.css">
    <title>Project - Seat Booking</title>
</head>
<body>
    <main id="seat-booking-app">
        <div id="settings" class="settings">
            <div class="services-list">
                <label for="services-list">Select a Movie:</label>
                <select name="services-list" id="services-list"></select>
                
                <h3>Movie title:</h3>
                <label for="service-name" class="visually-hidden">Movie Title Input</label>
                <input type="text" name="service-name" id="service-name">
                
                <h3>Price base:</h3>
                <label for="service-price" class="visually-hidden">Price Base Input</label>
                <input type="number" name="service-price" id="service-price" min="0" max="100" step="0.01">
                
                <div class="services-list__btns">
                    <button id="service-add-btn" class="btn">Add new</button>
                    <button id="service-update-btn" class="btn">Save changes</button>
                    <button id="service-delete-btn" class="btn">Delete</button>
                </div>
            </div>

            <section class="sectors" aria-labelledby="sectors-heading">
                <h3 id="sectors-heading">Price multipliers for each sector:</h3>
                <button id="sectors-price-btn" class="btn">Edit sectors' prices</button>
                <ul id="sectors-list" class="sectors__list"></ul>
                <button id="sectors-save-btn" class="btn">Save</button>
            </section>

            <section id="order" class="order" aria-labelledby="order-heading">
                <div class="order__header">
                    <h2 id="order-heading">Tickets:</h2>
                </div>
                <div class="order__main">
                    <ul id="order-details"></ul>
                </div>
                <div id="order-footer" class="order__footer">
                    <span id="order-total-price"></span>
                    <button id="book-seats-btn" class="btn">Buy</button>
                    <p style="font-size: 0.7rem; margin-top: 1rem;">
                        By using this service, you agree to our 
                        <a href="privacy.html" target="_blank" aria-label="Read our privacy policy">Privacy Policy</a>.
                    </p>
                </div>
            </section>
        </div>         
        <article id="screening-room-1">
            <div id="screen" aria-label="Cinema Screen">Screen</div>
            <div id="seats" role="group" aria-label="Seat Selection Grid"></div>  
        </article>
    </main>

    <aside id="cookie-banner" class="cookie-banner" role="complementary" aria-label="Cookie Consent" style="position: fixed; bottom: 0; width: 100%; background: #333; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 1000;">
        <p style="margin: 0;">We use local storage to save your seat bookings and preferences. 
           <a href="privacy.html" style="color: #80e5ff;">Learn more about our privacy policy</a>
        </p>
        <button id="accept-cookies" class="btn" style="background: #80e5ff; border: none; padding: 0.5rem 1rem; cursor: pointer;">Accept</button>
    </aside>

    <script src="script/seat-booking-app.js"></script>
    <script>
        document.getElementById('accept-cookies')?.addEventListener('click', function() {
            document.getElementById('cookie-banner').style.display = 'none';
            localStorage.setItem('cookiesAccepted', 'true');
        });
        if (localStorage.getItem('cookiesAccepted') === 'true') {
            document.getElementById('cookie-banner').style.display = 'none';
        }
    </script>
</body>
</html>
